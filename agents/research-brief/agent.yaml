# Agent manifest — the exemplar for ADR-0006 (declarative agent definitions).
# Adding a new agentic app = a new directory with agent.yaml + prompt.md. No core changes.

name: research-brief
description: Daily research brief on configured topics, written as a markdown file
tools: [WebSearch, WebFetch, Read, Write]   # used by claude-sdk executor only; openrouter v1 has no tools
executor: openrouter                        # ADR-0002: provider-pluggable (claude-sdk | openrouter)
model: default                              # default -> OPENROUTER_DEFAULT_MODEL (a :free model)
max_turns: 30
requires_approval: false                    # read-only agent: no consent gate needed
schedule: "0 7 * * *"                       # default cadence; `octo schedule sync` upserts to DB
params:
  topics:
    - Claude Agent SDK updates
    - GCP Cloud Run news
    - pgvector patterns and postgres-as-queue
output:
  dir: data/briefs
